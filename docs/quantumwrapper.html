<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Primer/21.1.1/primer.css" crossorigin="anonymous">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$']], // Add ['$','$'] to the inlineMath array
          displayMath: [['$$', '$$']]
        },
        startup: {
          pageReady: () => {
            return MathJax.startup.defaultPageReady().then(() => {
              // Optional: Add any additional startup actions here
              console.log('MathJax is ready and equations should be rendered.');
            });
          }
        }
      };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
</head>
<body>
<div id="markdownContent"></div>
<script src="https://cdn.jsdelivr.net/npm/showdown/dist/showdown.min.js"></script>
<script>
  window.onload = function() {
    var converter = new showdown.Converter();
    var markdownContentPath = 'quantum.md'; // Update this path
    
    fetch(markdownContentPath)
      .then(response => response.text())
      .then(text => {
        var htmlContent = converter.makeHtml(text);
        console.log(htmlContent); // This should output the converted HTML
        document.getElementById('markdownContent').innerHTML = '<div class="markdown-body">' + htmlContent + '</div>';
        // Optionally, trigger MathJax to reprocess the document if you have LaTeX in your Markdown
        if (window.MathJax) {
          MathJax.typesetPromise();
        }
      })
      .catch(err => console.error('Failed to load Markdown file:', err));
  };
</script>


</body>
</html>
