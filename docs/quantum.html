<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" async
        src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML">
    </script>
    <script type="text/javascript" src="/mathjax-config.js"></script>
</head>
<body>
    <div id="markdown-content"></div>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/marked/2.0.1/marked.min.js"></script>
  <script type="text/javascript">
      // Fetch and render your markdown content here
      fetch('quantum.md')
          .then(response => response.text())
          .then(content => {
              const markdownContent = document.getElementById('markdown-content');
              markdownContent.innerHTML = marked(content);
          });
  </script>
</body>
</html>
